version: '3.8'

services:
  # Development server with hot reload
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_LOG_LEVEL=debug
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - devops-network
    restart: unless-stopped
    command: npm run dev

  # Redis for development
  redis-dev:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - devops-network
    restart: unless-stopped

networks:
  devops-network:
    driver: bridge
